<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLS CRM — Germany Language School</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface2: #f9f9f7;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text: #0b0b0b;
  --text2: #52514e;
  --text3: #898781;
  --radius: 8px;
  --blue: #2a78d6;
  --green: #1baf7a;
  --amber: #eda100;
  --red: #e34948;
  --purple: #4a3aa7;
  --nav-h: 52px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141413;
    --surface: #1e1e1c;
    --surface2: #242422;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #f0efe8;
    --text2: #c3c2b7;
    --text3: #898781;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* NAV */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100}
.brand{font-size:15px;font-weight:600;color:var(--text);margin-right:8px;white-space:nowrap}
.brand span{color:var(--blue)}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;flex:1}
.nav-tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:6px 12px;border-radius:var(--radius);border:none;background:transparent;color:var(--text3);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.tab-btn:hover{background:var(--surface2);color:var(--text)}
.tab-btn.active{background:var(--blue);color:#fff;font-weight:500}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);white-space:nowrap;margin-left:auto}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.dot.stale{background:var(--amber)}
.dot.error{background:var(--red)}

/* LAYOUT */
.page{margin-top:var(--nav-h);padding:20px;max-width:1200px;margin-left:auto;margin-right:auto}
.section{display:none}.section.active{display:block}

/* KPI ROW */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.kpi-value{font-size:24px;font-weight:600;color:var(--text);line-height:1.1}
.kpi-sub{font-size:11px;margin-top:4px}
.up{color:var(--green)}.dn{color:var(--red)}.warn{color:var(--amber)}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}

/* CHARTS */
.chart-wrap{position:relative;width:100%}
.h180{height:180px}.h220{height:220px}.h260{height:260px}.h300{height:300px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--text3);font-weight:600;padding:7px 10px;border-bottom:0.5px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.b-green{background:#d4f0e0;color:#0e6b42}
.b-amber{background:#fdefd0;color:#7a4a00}
.b-blue{background:#dbeafe;color:#1549a0}
.b-red{background:#fde0e0;color:#991414}
.b-gray{background:#e8e8e4;color:#555552}
.b-purple{background:#e8e6fc;color:#3b2ea0}
@media(prefers-color-scheme:dark){
  .b-green{background:#0e3d25;color:#5ce0a0}
  .b-amber{background:#3d2d00;color:#f5c04a}
  .b-blue{background:#0e2a5c;color:#7aadee}
  .b-red{background:#3d0e0e;color:#f08080}
  .b-gray{background:#2e2e2b;color:#aaa}
  .b-purple{background:#1e1850;color:#a09af0}
}

/* FUNNEL */
.funnel{display:flex;flex-direction:column;gap:8px}
.f-row{display:grid;grid-template-columns:90px 1fr 40px 44px;align-items:center;gap:10px}
.f-label{font-size:12px;color:var(--text2)}
.f-track{background:var(--surface2);border-radius:4px;height:26px;overflow:hidden;position:relative}
.f-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff;transition:width .5s}
.f-val{font-size:13px;font-weight:600;color:var(--text);text-align:right}
.f-pct{font-size:11px;color:var(--text3);text-align:right}

/* PROGRESS */
.prog-row{display:grid;grid-template-columns:150px 1fr 40px;align-items:center;gap:10px;margin-bottom:7px}
.prog-label{font-size:12px;color:var(--text2)}
.prog-track{background:var(--surface2);border-radius:3px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-val{font-size:12px;font-weight:600;color:var(--text);text-align:right}

/* NPS BAR */
.nps-strip{display:flex;height:22px;border-radius:4px;overflow:hidden;margin:10px 0 4px}
.nps-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.leg{display:flex;align-items:center;gap:5px}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* LOADING / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#fde0e0;color:#991414;border-radius:8px;padding:14px 18px;font-size:13px;margin:20px 0}
@media(prefers-color-scheme:dark){.error-msg{background:#3d0e0e;color:#f08080}}

/* ACTION QUEUE */
.aq-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border);gap:12px}
.aq-row:last-child{border-bottom:none}
.aq-left{display:flex;align-items:flex-start;gap:10px;flex:1}
.aq-text{font-size:13px;color:var(--text)}
.aq-sub{font-size:11px;color:var(--text3);margin-top:2px}
.aq-count{font-size:20px;font-weight:700;color:var(--text);text-align:right;min-width:36px}

/* SEARCH */
.search-bar{width:100%;padding:8px 12px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:12px;outline:none}
.search-bar:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(42,120,214,.15)}

/* TIMESTAMP CHIP */
.ts-chip{font-size:11px;color:var(--text3);background:var(--surface2);border:0.5px solid var(--border);padding:3px 8px;border-radius:10px}
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topbar">
  <div class="brand">GLS <span>CRM</span></div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('overview',this)">Overview</button>
    <button class="tab-btn" onclick="showTab('demo',this)">Demo funnel</button>
    <button class="tab-btn" onclick="showTab('revenue',this)">Revenue</button>
    <button class="tab-btn" onclick="showTab('batches',this)">Batches</button>
    <button class="tab-btn" onclick="showTab('teachers',this)">Teachers</button>
    <button class="tab-btn" onclick="showTab('nps',this)">NPS</button>
    <button class="tab-btn" onclick="showTab('leads',this)">Lead priority</button>
    <button class="tab-btn" onclick="showTab('students',this)">All students</button>
  </div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
    <span class="ts-chip" id="lastUpdated">—</span>
  </div>
</div>

<div class="page" id="app">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div>Loading live data…</div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
// PASTE YOUR APPS SCRIPT WEB APP URL HERE after deploying:
const API_URL = 'https://script.google.com/macros/s/AKfycbzSxtV-GJ3gRfcLgUNv2sP8ziNWZkRBXA1ANWB4sjbeUCueCGniQNVXtrBUtALZpyYsoQ/exec';
const REFRESH_MS = 60000; // 60 seconds

// ─── STATE ───────────────────────────────────────────────────
let D = null;
let charts = {};
let currentTab = 'overview';
let refreshTimer = null;

// ─── FETCH ───────────────────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch(API_URL + '?t=' + Date.now(), { cache: 'no-store' });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API error');
    D = json.data;
    setStatus('live', 'Live · ' + fmtTime(new Date(json.ts)));
    return true;
  } catch(e) {
    setStatus('error', 'Error fetching data');
    console.error(e);
    return false;
  }
}

function setStatus(state, text) {
  const dot  = document.getElementById('statusDot');
  const span = document.getElementById('statusText');
  dot.className = 'dot' + (state === 'error' ? ' error' : state === 'stale' ? ' stale' : '');
  span.textContent = text;
  document.getElementById('lastUpdated').textContent = fmtTime(new Date());
}

async function init() {
  const ok = await fetchData();
  if (ok) renderAll();
  else showError();
  scheduleRefresh();
}

async function refresh() {
  const ok = await fetchData();
  if (ok) renderAll();
  scheduleRefresh();
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refresh, REFRESH_MS);
}

// ─── TAB NAVIGATION ─────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('tab-' + id);
  if (el) el.classList.add('active');
  if (btn) btn.classList.add('active');
  currentTab = id;
}

// ─── RENDER ──────────────────────────────────────────────────
function renderAll() {
  const app = document.getElementById('app');
  app.innerHTML = buildHTML();
  document.getElementById('loadingState')?.remove();
  renderCharts();
  // restore active tab
  const btn = [...document.querySelectorAll('.tab-btn')].find(b => b.textContent.toLowerCase().includes(currentTab === 'overview' ? 'overview' : currentTab));
  showTab(currentTab, btn || document.querySelector('.tab-btn'));
  // student search
  const search = document.getElementById('studentSearch');
  if (search) search.addEventListener('input', filterStudents);
}

function showError() {
  document.getElementById('app').innerHTML = `
    <div class="error-msg">
      <strong>Could not load data.</strong><br>
      Make sure your Apps Script is deployed and <code>API_URL</code> is set in <code>index.html</code>.<br>
      Check the browser console for details.
    </div>`;
}

// ─── FORMATTERS ──────────────────────────────────────────────
const fmtINR = v => '₹' + Math.round(v).toLocaleString('en-IN');
const fmtNum = v => Math.round(v).toLocaleString();
const fmtTime = d => d.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
const pct = (n, d) => d ? Math.round(n/d*100) : 0;

function attBadge(pctStr) {
  const v = parseFloat(pctStr);
  if (isNaN(v)) return `<span class="badge b-gray">—</span>`;
  if (v >= 75) return `<span class="badge b-green">${Math.round(v)}%</span>`;
  if (v >= 50) return `<span class="badge b-amber">${Math.round(v)}%</span>`;
  return `<span class="badge b-red">${Math.round(v)}%</span>`;
}

// ─── HTML BUILDERS ───────────────────────────────────────────
function buildHTML() {
  return `
    ${buildOverview()}
    ${buildDemo()}
    ${buildRevenue()}
    ${buildBatches()}
    ${buildTeachers()}
    ${buildNPS()}
    ${buildLeads()}
    ${buildStudents()}
  `;
}

function kpi(label, value, sub, subClass='') {
  return `<div class="kpi">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${value}</div>
    ${sub ? `<div class="kpi-sub ${subClass}">${sub}</div>` : ''}
  </div>`;
}

function buildOverview() {
  const m = D.metrics; const db = D.dashboard;
  const totalStudents = D.students.length;
  return `<div id="tab-overview" class="section">
    <div class="kpi-grid">
      ${kpi('Total leads', fmtNum(db.totalLeads), 'Premium EU pipeline')}
      ${kpi('Enrollments', fmtNum(db.totalEnrollments), db.conversionRate + ' conversion', 'up')}
      ${kpi('Revenue collected', fmtINR(m.totalRev), fmtINR(m.totalPending) + ' pending', 'warn')}
      ${kpi('Active batches', db.activeBatches, db.capacityUtil + ' capacity used')}
      ${kpi('NPS score', m.npsScore, m.npsTotal + ' responses', 'up')}
      ${kpi('Demo show rate', pct(m.demoAttended, m.demoTotal) + '%', m.demoAttended + ' of ' + m.demoTotal + ' attended')}
      ${kpi('Total students', totalStudents, 'across all batches')}
      ${kpi('Enrolled this week', db.enrollWeek, 'new this week', 'up')}
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Enrollment funnel</div>
        <div class="funnel">
          <div class="f-row"><div class="f-label">Total leads</div><div class="f-track"><div class="f-fill" style="width:100%;background:var(--blue)">${fmtNum(db.totalLeads)}</div></div><div class="f-val">${fmtNum(db.totalLeads)}</div><div class="f-pct"></div></div>
          <div class="f-row"><div class="f-label">Demo booked</div><div class="f-track"><div class="f-fill" style="width:${pct(m.demoTotal,db.totalLeads)}%;background:var(--green)">${m.demoTotal}</div></div><div class="f-val">${m.demoTotal}</div><div class="f-pct">${pct(m.demoTotal,db.totalLeads)}%</div></div>
          <div class="f-row"><div class="f-label">Demo attended</div><div class="f-track"><div class="f-fill" style="width:${pct(m.demoAttended,db.totalLeads)}%;background:var(--purple)">${m.demoAttended}</div></div><div class="f-val">${m.demoAttended}</div><div class="f-pct">${pct(m.demoAttended,db.totalLeads)}%</div></div>
          <div class="f-row"><div class="f-label">Enrolled</div><div class="f-track"><div class="f-fill" style="width:${pct(db.totalEnrollments,db.totalLeads)}%;background:var(--amber)">${db.totalEnrollments}</div></div><div class="f-val">${db.totalEnrollments}</div><div class="f-pct">${db.conversionRate}</div></div>
          <div class="f-row"><div class="f-label">Batch assigned</div><div class="f-track"><div class="f-fill" style="width:${pct(db.batchAssigned,db.totalLeads)}%;background:var(--red)">${db.batchAssigned}</div></div><div class="f-val">${db.batchAssigned}</div><div class="f-pct">${pct(db.batchAssigned,db.totalEnrollments)}%</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Revenue by month</div>
        <div class="legend"><div class="leg"><div class="leg-sq" style="background:var(--blue)"></div>Revenue (₹)</div></div>
        <div class="chart-wrap h220"><canvas id="c-revMonth" role="img" aria-label="Monthly revenue bar chart"></canvas></div>
      </div>
    </div>
    <div class="grid3">
      <div class="card">
        <div class="card-title">Students by level</div>
        <div class="chart-wrap h180"><canvas id="c-levelPie" role="img" aria-label="Students by level donut chart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Avg attendance by batch</div>
        <div class="chart-wrap h180"><canvas id="c-attBatch" role="img" aria-label="Average attendance by batch bar chart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">A2 upsell readiness</div>
        <div style="font-size:32px;font-weight:700;color:var(--text);margin-bottom:4px">${m.a2Interested}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:14px">of ${m.a1Count} A1 students want A2</div>
        <div class="prog-row"><div class="prog-label">Confirmed yes</div><div class="prog-track"><div class="prog-fill" style="width:${pct(m.a2Interested,m.a1Count)}%;background:var(--green)"></div></div><div class="prog-val">${m.a2Interested}</div></div>
        <div style="margin-top:12px;font-size:11px;color:var(--text3)">Upsell potential: ~${fmtINR(m.a2Interested*12000)} at ₹12K/student</div>
      </div>
    </div>
  </div>`;
}

function buildDemo() {
  const m = D.metrics;
  const months = Object.keys(m.demoByMonth).sort();
  return `<div id="tab-demo" class="section">
    <div class="kpi-grid">
      ${kpi('Total booked', m.demoTotal, '')}
      ${kpi('Attended', m.demoAttended, pct(m.demoAttended,m.demoTotal)+'% show rate','up')}
      ${kpi('No shows', m.demoNoShow, pct(m.demoNoShow,m.demoTotal)+'% no-show','dn')}
      ${kpi('Enrolled post-demo', m.demoEnrolled, pct(m.demoEnrolled,m.demoAttended)+'% of attendees','up')}
      ${kpi('Still interested', m.demoInterested, 'warm pipeline to close','warn')}
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Demo funnel</div>
        <div class="funnel">
          <div class="f-row"><div class="f-label">Booked</div><div class="f-track"><div class="f-fill" style="width:100%;background:var(--blue)">${m.demoTotal}</div></div><div class="f-val">${m.demoTotal}</div><div class="f-pct"></div></div>
          <div class="f-row"><div class="f-label">Attended</div><div class="f-track"><div class="f-fill" style="width:${pct(m.demoAttended,m.demoTotal)}%;background:var(--green)">${m.demoAttended}</div></div><div class="f-val">${m.demoAttended}</div><div class="f-pct">${pct(m.demoAttended,m.demoTotal)}%</div></div>
          <div class="f-row"><div class="f-label">Enrolled</div><div class="f-track"><div class="f-fill" style="width:${pct(m.demoEnrolled,m.demoTotal)}%;background:var(--amber)">${m.demoEnrolled}</div></div><div class="f-val">${m.demoEnrolled}</div><div class="f-pct">${pct(m.demoEnrolled,m.demoAttended)}% of att.</div></div>
          <div class="f-row"><div class="f-label">Interested</div><div class="f-track"><div class="f-fill" style="width:${pct(m.demoInterested,m.demoTotal)}%;background:var(--purple)">${m.demoInterested}</div></div><div class="f-val">${m.demoInterested}</div><div class="f-pct">${pct(m.demoInterested,m.demoTotal)}%</div></div>
        </div>
        <div style="margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);font-size:12px;color:var(--text2)">
          Key drop-off: <strong>${pct(m.demoNoShow,m.demoTotal)}%</strong> no-show rate. Once attended → enrolled rate is <strong>${pct(m.demoEnrolled,m.demoAttended)}%</strong> — healthy. Priority: reduce no-shows with reminders.
        </div>
      </div>
      <div class="card">
        <div class="card-title">Demos by month</div>
        <div class="legend">
          <div class="leg"><div class="leg-sq" style="background:var(--blue)"></div>Booked</div>
          <div class="leg"><div class="leg-sq" style="background:var(--green)"></div>Attended</div>
        </div>
        <div class="chart-wrap h220"><canvas id="c-demoMonth" role="img" aria-label="Demos booked vs attended by month"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Recent demo sessions</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Name</th><th>Date</th><th>Attendance</th><th>Status</th><th>Remarks</th></tr></thead>
        <tbody>${D.demos.slice(0,30).map(d=>`<tr>
          <td>${d.name||'—'}</td>
          <td style="color:var(--text2)">${(d.startTime||'').split(' ')[0]||'—'}</td>
          <td>${d.attendance==='Attended'?'<span class="badge b-green">Attended</span>':'<span class="badge b-red">No show</span>'}</td>
          <td>${d.enrollment?`<span class="badge ${d.enrollment==='Enrolled'?'b-green':d.enrollment==='Interested'?'b-amber':'b-gray'}">${d.enrollment}</span>`:'—'}</td>
          <td style="color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.remarks||d.hostUpdate||'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  </div>`;
}

function buildRevenue() {
  const m = D.metrics; const db = D.dashboard;
  const batches = Object.keys(m.revByBatch).sort();
  const counsellors = [
    {name:'kalindi.raheja', enroll:4, rev:60000, incentive:4000},
    {name:'kashish.sachdeva', enroll:5, rev:67500, incentive:5000},
    {name:'saritha.reddy', enroll:3, rev:36000, incentive:3000},
    {name:'ayush.jaiswal', enroll:2, rev:39000, incentive:1000},
    {name:'neha.aggarwal', enroll:1, rev:12000, incentive:0},

// ─── CHARTS ──────────────────────────────────────────────────
function renderCharts() {
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  const grid = dark ? '#2c2c2a' : '#e5e5e1';
  const tick = dark ? '#898781' : '#898781';

  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const base = (id) => document.getElementById(id);
  const opts = (extra={}) => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false}, tooltip:{callbacks:{}} },
    scales:{
      x:{grid:{color:grid,lineWidth:.5},ticks:{color:tick,font:{size:11}}},
      y:{grid:{color:grid,lineWidth:.5},ticks:{color:tick,font:{size:11}}}
    },
    ...extra
  });

  const m = D.metrics;

  // Revenue by month
  const months = Object.keys(m.revByMonth).sort();
  if (base('c-revMonth')) charts.revMonth = new Chart(base('c-revMonth'), {
    type:'bar',
    data:{labels:months.map(k=>{const p=k.split('/');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(p[0])-1]}),
      datasets:[{data:months.map(k=>m.revByMonth[k]),backgroundColor:'#2a78d6',borderRadius:4,borderSkipped:false}]},
    options:opts({scales:{x:opts().scales.x,y:{...opts().scales.y,ticks:{color:tick,font:{size:11},callback:v=>'₹'+(v/1000).toFixed(0)+'K'}}}})
  });

  if (base('c-revMonthFull')) charts.revMonthFull = new Chart(base('c-revMonthFull'), {
    type:'bar',
    data:{labels:months.map(k=>{const p=k.split('/');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(p[0])-1]}),
      datasets:[{data:months.map(k=>m.revByMonth[k]),backgroundColor:'#2a78d6',borderRadius:4,borderSkipped:false}]},
    options:opts({scales:{x:opts().scales.x,y:{...opts().scales.y,ticks:{color:tick,font:{size:11},callback:v=>'₹'+(v/1000).toFixed(0)+'K'}}}})
  });

  // Students by level
  const levels = Object.keys(m.byLevel);
  if (base('c-levelPie')) charts.levelPie = new Chart(base('c-levelPie'), {
    type:'doughnut',
    data:{labels:levels,datasets:[{data:levels.map(l=>m.byLevel[l]),backgroundColor:['#2a78d6','#1baf7a','#eda100'],borderWidth:2,borderColor:dark?'#1e1e1c':'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:tick,font:{size:11},boxWidth:10,padding:10}}}}
  });

  // Avg att by batch
  const batches = Object.keys(m.avgAttByBatch).sort((a,b)=>parseInt(a)-parseInt(b));
  const attVals = batches.map(b=>m.avgAttByBatch[b]>100?null:m.avgAttByBatch[b]);
  const attColors = attVals.map(v=>v===null?'#e1e0d9':v>=75?'#1baf7a':v>=50?'#eda100':'#e34948');
  if (base('c-attBatch')) charts.attBatch = new Chart(base('c-attBatch'), {
    type:'bar',
    data:{labels:batches.map(b=>'B'+b),datasets:[{data:attVals,backgroundColor:attColors,borderRadius:4,borderSkipped:false}]},
    options:opts({scales:{x:opts().scales.x,y:{...opts().scales.y,max:100,ticks:{color:tick,font:{size:11},callback:v=>v+'%'}}}})
  });

  // Demo by month
  const dMonths = Object.keys(m.demoByMonth).sort();
  if (base('c-demoMonth')) charts.demoMonth = new Chart(base('c-demoMonth'), {
    type:'bar',
    data:{labels:dMonths.map(k=>{const p=k.split('/');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(p[0])-1]}),
      datasets:[
        {label:'Booked',data:dMonths.map(k=>m.demoByMonth[k]),backgroundColor:'#2a78d6',borderRadius:4,borderSkipped:false},
        {label:'Attended',data:dMonths.map(k=>m.demoAttByMonth[k]||0),backgroundColor:'#1baf7a',borderRadius:4,borderSkipped:false}
      ]},
    options:opts()
  });

  // Revenue by batch
  const revBatches = Object.keys(m.revByBatch).sort();
  if (base('c-revBatch')) charts.revBatch = new Chart(base('c-revBatch'), {
    type:'bar',
    data:{labels:revBatches,datasets:[{data:revBatches.map(b=>m.revByBatch[b]),backgroundColor:'#4a3aa7',borderRadius:4,borderSkipped:false}]},
    options:opts({scales:{x:opts().scales.x,y:{...opts().scales.y,ticks:{color:tick,font:{size:11},callback:v=>'₹'+(v/1000).toFixed(0)+'K'}}}})
  });

  // Students per batch
  const batchStudentKeys = Object.keys(m.studentsPerBatch).sort();
  if (base('c-batchStudents')) charts.batchStudents = new Chart(base('c-batchStudents'), {
    type:'bar',
    data:{labels:batchStudentKeys,datasets:[{data:batchStudentKeys.map(k=>m.studentsPerBatch[k]),backgroundColor:'#2a78d6',borderRadius:4,borderSkipped:false}]},
    options:opts()
  });

  // Low attendance
  const lowBatches = Object.keys(m.lowAttByBatch).sort();
  if (base('c-lowAtt')) charts.lowAtt = new Chart(base('c-lowAtt'), {
    type:'bar',
    data:{labels:lowBatches.map(b=>'Batch '+b),datasets:[{data:lowBatches.map(b=>m.lowAttByBatch[b]),backgroundColor:'#e34948',borderRadius:4,borderSkipped:false}]},
    options:opts()
  });

  // Teacher attendance
  if (base('c-teacherAtt')) charts.teacherAtt = new Chart(base('c-teacherAtt'), {
    type:'bar',
    data:{
      labels:['B1','B2','B3','B4','B5','B6'],
      datasets:[
        {label:'Charvi',data:[58,42,63,null,null,37],backgroundColor:'#2a78d6',borderRadius:4,borderSkipped:false},
        {label:'Simran',data:[null,null,null,38,21,null],backgroundColor:'#1baf7a',borderRadius:4,borderSkipped:false}
      ]
    },
    options:opts({scales:{x:opts().scales.x,y:{...opts().scales.y,max:100,ticks:{color:tick,font:{size:11},callback:v=>v+'%'}}}})
  });

  // Module scores
  if (base('c-moduleScores')) charts.moduleScores = new Chart(base('c-moduleScores'), {
    type:'bar',
    data:{
      labels:['Batch 2','Batch 3'],
      datasets:[
        {label:'Reading',data:[22.2,23.0],backgroundColor:'#2a78d6',borderRadius:4,borderSkipped:false},
        {label:'Listening',data:[20.8,20.8],backgroundColor:'#1baf7a',borderRadius:4,borderSkipped:false},
        {label:'Speaking',data:[21.0,21.0],backgroundColor:'#eda100',borderRadius:4,borderSkipped:false},
        {label:'Writing',data:[21.8,23.0],backgroundColor:'#4a3aa7',borderRadius:4,borderSkipped:false}
      ]
    },
    options:opts({scales:{x:opts().scales.x,y:{...opts().scales.y,max:25}}})
  });

  // NPS donut
  if (base('c-npsChart')) charts.npsChart = new Chart(base('c-npsChart'), {
    type:'doughnut',
    data:{
      labels:['Promoters (5)','Passives (4)','Detractors (1-3)'],
      datasets:[{data:[m.promoters,m.passives,m.detractors],backgroundColor:['#1baf7a','#eda100','#e34948'],borderWidth:2,borderColor:dark?'#1e1e1c':'#fff'}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:tick,font:{size:11},boxWidth:10,padding:10}}}}
  });
}

// ─── BOOT ────────────────────────────────────────────────────
init();
</script>
